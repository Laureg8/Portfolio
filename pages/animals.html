<script>
    let desc = {
        animals:[
        {"titre":"Photographie animaliere", "txt":"Je pratique la photographie animaliére depuis plus de 2 ans maintenant. Les animaux et la nature en général sont pour moi une de mes plus grande source d'inspiration, c'est pour cela que j'aime les observer au plus près !",

    let descEN = {

        "titre2" : "Creation",

    };

    let txt = document.getElementById("txt");

    let prod = document.getElementById("prod");
    let trad = document.getElementById("trad");

    titre.textContent = desc.animals[0].titre;

    prod.textContent = desc.animals[0].products;

    trad.addEventListener("click", () => {
            titre.textContent = descEN.animals[0].titre;

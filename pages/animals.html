    <div class="modal" id="modal">
        <div class="modal-overlay"></div>

        <div class="modal-content">
            <span class="close">&times;</span>
            <img id="modal-img" src="">
        </div>
    </div>

    
    <script>

        ScrollReveal().reveal('.animals div');

        let desc = {
            animals:[
            {"titre":"Photographie animaliere", "txt":"Je pratique la photographie animalière depuis plus de 2 ans maintenant. Les animaux et la nature en général sont pour moi une de mes plus grande source d'inspiration, c'est pour cela que j'aime les observer au plus près !", 
            "titre2" : "Conception", 
            "products" :"Appareils : Canon EOS R10 Objectif : f/11 600mm Modéles : Nos voisins de la forêt Retouches : Lightroom Classic"  }  
            ]
        };

        let descEN = {
            animals:[
            {"titre":"Wild life photography", "txt":"I've been practising wild life photography almost for 2 years. Animals and nature are for me a greatest source of inspiration, that's the reason why I love to observe them ! ", 
            "titre2" : "Creation", 
            "products" :"Camera : Canon EOS R10 Lens : f/11 600mm Models : Animals of the forest Retouch : adobe Lightroom"  }  
            ]
        };

        let txt = document.getElementById("txt");
        let titre2 = document.getElementById("titre2");
        let prod = document.getElementById("prod");
        let trad = document.getElementById("trad");

        txt.textContent = desc.animals[0].txt;
        titre2.textContent = desc.animals[0].titre2;
        prod.textContent = desc.animals[0].products;

        // trad.addEventListener("click", () => {
        //         titre.textContent = descEN.animals[0].titre;
        //         txt.textContent = descEN.animals[0].txt;
        //         titre2.textContent = descEN.animals[0].titre2;
        //         prod.textContent = descEN.animals[0].products;
                
        // });

        const photos = document.querySelectorAll(".photo");
        const modal = document.getElementById("modal");
        const modalImg = document.getElementById("modal-img");
        const closeBtn = document.querySelector(".close");

        photos.forEach(photo => {
            photo.addEventListener("click", () => {
                const img = photo.src;
                
                modalImg.src = img;

                modal.classList.add("active");
            });
        });

        closeBtn.addEventListener("click", () => {
            modal.classList.remove("active");
        });

        modal.addEventListener("click", (e) => {
            if (e.target === modal) {
                modal.classList.remove("active");
            }
        });
        
    </script>
